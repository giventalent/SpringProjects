<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Project To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --brown: #2C1A0E;
    --rust: #C45C2A;
    --sand: #D4B896;
    --moss: #4A5E3A;
    --sky: #3D6B8C;
    --light-sand: #EDE5D6;
    --yt-red: #CC0000;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background-color: black;
color: var(–brown);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
background-image:
radial-gradient(circle at 10% 20%, rgba(196,92,42,0.06) 0%, transparent 50%),
radial-gradient(circle at 90% 80%, rgba(61,107,140,0.06) 0%, transparent 50%),
url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’ fill-rule=‘evenodd’%3E%3Cg fill=’%232C1A[...]
}

header {
background: var(–brown);
color: var(–cream);
padding: 2.5rem 2rem 2rem;
position: relative;
overflow: hidden;
}
header::before {
content: ‘🏠’; 
position: absolute;
font-size: 8rem;
right: -1rem;
top: -1rem;
opacity: 0.08;
}
header h1 {
font-family: ‘DM Serif Display’, serif;
font-size: 2.2rem;
line-height: 1.1;
margin-bottom: 0.4rem;
}
header p {
color: var(–sand);
font-size: 0.75rem;
letter-spacing: 0.1em;
text-transform: uppercase;
}

.stats-bar {
background: var(–rust);
color: var(–cream);
display: flex;
gap: 2rem;
padding: 0.75rem 2rem;
font-size: 0.7rem;
letter-spacing: 0.08em;
text-transform: uppercase;
}
.stat { display: flex; align-items: center; gap: 0.5rem; }
.stat-num { font-size: 1.1rem; font-weight: 500; }

.progress-bar-wrap { height: 3px; background: var(–light-sand); }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(–rust), var(–moss)); transition: width 0.4s ease; }

.controls {
padding: 1.5rem 2rem 0.5rem;
display: flex;
gap: 0.5rem;
flex-wrap: wrap;
}
.filter-btn {
background: none;
border: 1.5px solid var(–sand);
color: var(–brown);
font-family: ‘DM Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 0.4rem 0.9rem;
border-radius: 2px;
cursor: pointer;
transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
background: var(–brown);
border-color: var(–brown);
color: var(–cream);
}

.add-form {
padding: 0 2rem 1rem;
display: flex;
gap: 0.5rem;
flex-wrap: wrap;
}
.add-form input {
flex: 1;
min-width: 130px;
background: var(–light-sand);
border: 1.5px solid var(–sand);
color: var(–brown);
font-family: ‘DM Mono’, monospace;
font-size: 0.8rem;
padding: 0.6rem 1rem;
border-radius: 2px;
outline: none;
transition: border-color 0.15s;
}
.add-form input:focus { border-color: var(–rust); }
.add-form input::placeholder { color: var(–sand); }
.add-form select {
background: var(–light-sand);
border: 1.5px solid var(–sand);
color: var(–brown);
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
padding: 0.6rem 0.8rem;
border-radius: 2px;
outline: none;
cursor: pointer;
}
.add-btn {
background: var(–rust);
border: none;
color: var(–cream);
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
font-weight: 500;
padding: 0.6rem 1.2rem;
border-radius: 2px;
cursor: pointer;
transition: background 0.15s;
white-space: nowrap;
}
.add-btn:hover { background: var(–brown); }

main { padding: 0.5rem 2rem 3rem; }

.section-label {
font-size: 0.6rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–rust);
margin: 1.5rem 0 0.75rem;
display: flex;
align-items: center;
gap: 0.75rem;
}
.section-label::after {
content: ‘’; 
flex: 1;
height: 1px;
background: var(–sand);
opacity: 0.5;
}

.task-card {
background: white;
border: 1.5px solid var(–light-sand);
border-radius: 4px;
margin-bottom: 0.75rem;
overflow: hidden;
transition: box-shadow 0.15s, transform 0.15s;
animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}
.task-card:hover { box-shadow: 0 3px 12px rgba(44,26,14,0.1); transform: translateY(-1px); }
.task-card.done { opacity: 0.55; }

.task-main {
display: flex;
align-items: flex-start;
padding: 1rem 1.25rem;
gap: 1rem;
cursor: pointer;
}

.check-box {
width: 20px;
height: 20px;
border: 2px solid var(–sand);
border-radius: 2px;
flex-shrink: 0;
margin-top: 1px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}
.task-card.done .check-box { background: var(–moss); border-color: var(–moss); }
.check-box::after { content: ‘✓’; font-size: 0.7rem; opacity: 0; color: white; transition: opacity 0.15s; }
.task-card.done .check-box::after { opacity: 1; }

.task-info { flex: 1; min-width: 0; }
.task-name {
font-family: ‘DM Serif Display’, serif;
font-size: 1rem;
margin-bottom: 0.3rem;
}
.task-card.done .task-name { text-decoration: line-through; color: var(–sand); }

.task-meta { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
.tag {
font-size: 0.6rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 0.2rem 0.55rem;
border-radius: 2px;
font-weight: 500;
}
.tag-area { background: var(–light-sand); color: var(–brown); }
.tag-priority-high { background: #FDE8E0; color: #A03010; }
.tag-priority-med { background: #FEF3CD; color: #8A6000; }
.tag-priority-low { background: #E8F0E4; color: var(–moss); }

.task-actions {
display: flex;
align-items: center;
gap: 0.3rem;
flex-shrink: 0;
margin-left: auto;
}

.icon-btn {
background: none;
border: none;
cursor: pointer;
font-size: 0.85rem;
padding: 0.3rem 0.4rem;
border-radius: 3px;
opacity: 0.45;
transition: opacity 0.15s, background 0.15s;
line-height: 1;
}
.icon-btn:hover { opacity: 1; background: var(–light-sand); }

.yt-action-btn {
background: none;
border: 1.5px solid #e8b0b0;
border-radius: 3px;
cursor: pointer;
display: flex;
align-items: center;
gap: 0.3rem;
padding: 0.25rem 0.55rem;
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.08em;
color: var(–yt-red);
opacity: 0.7;
transition: all 0.15s;
white-space: nowrap;
}
.yt-action-btn:hover { opacity: 1; background: #FDE8E0; border-color: var(–yt-red); }

.yt-pill {
width: 18px;
height: 12px;
background: var(–yt-red);
border-radius: 2px;
position: relative;
flex-shrink: 0;
}
.yt-pill::after {
content: ‘’;
position: absolute;
left: 50%;
top: 50%;
transform: translate(-30%, -50%);
border-left: 5px solid white;
border-top: 3.5px solid transparent;
border-bottom: 3.5px solid transparent;
}

/* Detail panel */
.detail-panel { border-top: 1px dashed var(–light-sand); background: #FAFAF7; display: none; }
.detail-panel.open { display: block; }

.panel-tabs { display: flex; border-bottom: 1px solid var(–light-sand); }
.panel-tab {
background: none;
border: none;
border-bottom: 2px solid transparent;
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem;
letter-spacing: 0.12em;
text-transform: uppercase;
padding: 0.65rem 1.25rem;
cursor: pointer;
color: var(–sand);
transition: all 0.15s;
}
.panel-tab:first-child { padding-left: 3.5rem; }
.panel-tab.active { color: var(–rust); border-bottom-color: var(–rust); }

.tab-pane { display: none; padding: 1rem 1.25rem 1rem 3.5rem; }
.tab-pane.active { display: block; }

.section-mini-label {
font-size: 0.58rem;
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 0.65rem;
}
.tools-label { color: var(–rust); }
.videos-label { color: var(–yt-red); }

.tools-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.tool-chip {
background: var(–cream);
border: 1px solid var(–sand);
border-radius: 3px;
padding: 0.3rem 0.7rem;
font-size: 0.7rem;
display: flex;
align-items: center;
gap: 0.35rem;
color: var(–brown);
