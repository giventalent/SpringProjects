color: var(–brown);

cursor: pointer;
}

color: var(–cream);

font-size: 0.75rem;

border-radius: 2px;
cursor: pointer;
transition: background 0.15s;
white-space: nowrap;
}
.add-btn:hover { background: var(–brown); }

main { padding: 0.5rem 2rem 3rem; }

.section-label {
font-size: 0.6rem;
letter-spacing: 0.2em;

align-items: center;
gap: 0.75rem;
}

content: ‘’;

background: var(–sand);
opacity: 0.5;
}

.task-card {
background: white;
border: 1.5px solid var(–light-sand);
border-radius: 4px;
margin-bottom: 0.75rem;
overflow: hidden;
transition: box-shadow 0.15s, transform 0.15s;
animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}
.task-card:hover { box-shadow: 0 3px 12px rgba(44,26,14,0.1); transform: translateY(-1px); }
.task-card.done { opacity: 0.55; }

.task-main {
display: flex;
align-items: flex-start;
padding: 1rem 1.25rem;
gap: 1rem;
cursor: pointer;
}

.check-box {
width: 20px;
height: 20px;
border: 2px solid var(–sand);
border-radius: 2px;
flex-shrink: 0;
margin-top: 1px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}

.tag-priority-low { background: #E8F0E4; color: var(–moss); }

.icon-btn {

.icon-btn:hover { opacity: 1; background: var(–light-sand); }

align-items: center;

top: 50%;

border-top: 3.5px solid transparent;

position: relative;
overflow: hidden;

top: 50%;

border-top: 6px solid transparent;
border-bottom: 6px solid transparent;

}
.vid-thumb-overlay {
position: absolute;
inset: 0;
background: linear-gradient(135deg, #CC0000 0%, #880000 100%);

}

font-size: 0.75rem;
font-weight: 500;
margin-bottom: 0.2rem;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.vid-meta { font-size: 0.6rem; color: var(–sand); }
.vid-arrow { color: var(–yt-red); opacity: 0.55; font-size: 0.85rem; flex-shrink: 0; transition: opacity 0.15s; }

.empty-state .big { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-state p { font-size: 0.8rem; }

    <option value="low">Low</option>

</div>

function ytUrl(q) {
  return "https://www.youtube.com/results?search_query=" + encodeURIComponent(q);
}

function dataFor(name) {
  if (PRESETS[name]) return { icon: PRESETS[name].icon, tools: PRESETS[name].tools, videos: PRESETS[name].videos };
  return { icon: "🔧", tools: ["Review project details for specific tools needed"], videos: [{ title: "How to " + name + " – DIY Tutorial", channel: "YouTube Search", q: "how to " + name + " DIY home tutorial" }] };
}

function guessData(name) {
  const lc = name.toLowerCase();
  for (const [key] of Object.entries(PRESETS)) {
    if (lc.includes(key.toLowerCase()) || key.toLowerCase().includes(lc)) return dataFor(key);
  }
  const map = [
    ["paint", "Paint walls"], ["clean", "Deep clean bathroom"], ["lawn","Mow lawn"], ["mow","Mow lawn"],
    ["grass","Mow lawn"], ["fence","Repair fence"], ["drain","Unclog drain"], ["faucet","Fix leaky faucet"],
    ["plumb","Fix leaky faucet"], ["roof","Replace shingles"], ["shingle","Replace shingles"],
    ["gutter","Clean gutters"], ["deck","Repair deck"], ["window","Wash windows"], ["filter","Change HVAC filter"],
    ["hvac","Change HVAC filter"], ["garden","Plant garden bed"], ["plant","Plant garden bed"],
    ["shelf","Install shelving"], ["shelv","Install shelving"], ["drywall","Fix drywall"],
    ["trim","Trim hedges"], ["hedge","Trim hedges"], ["floor","Replace flooring"], ["door","Replace door knob"],
    ["mulch","Lay mulch"], ["garage","Organize garage"], ["aerate","Aerate lawn"]
  ];
  for (const [kw, preset] of map) {
    if (lc.includes(kw)) return dataFor(preset);
  }
  return { icon: "🔧", tools: ["Tape measure","Level","Drill","Screwdrivers (flat & Phillips)","Safety glasses","Work gloves"],
    videos: [{ title: "How to " + name + " – DIY Tutorial", channel: "YouTube Search", q: "how to " + name + " DIY home tutorial" }] };
}

let tasks = [
  { id:1,  name:"Paint walls",         area:"interior",     priority:"med",  done:false, data:dataFor("Paint walls") },
  { id:2,  name:"Clean gutters",       area:"exterior",     priority:"high", done:false, data:dataFor("Clean gutters") },
  { id:3,  name:"Mow lawn",            area:"yard",         priority:"med",  done:false, data:dataFor("Mow lawn") },
  { id:4,  name:"Change HVAC filter",  area:"maintenance",  priority:"high", done:false, data:dataFor("Change HVAC filter") },
  { id:5,  name:"Deep clean bathroom", area:"cleaning",     priority:"high", done:false, data:dataFor("Deep clean bathroom") },
  { id:6,  name:"Fix leaky faucet",    area:"interior",     priority:"high", done:false, data:dataFor("Fix leaky faucet") },
  { id:7,  name:"Repair deck",         area:"exterior",     priority:"med",  done:false, data:dataFor("Repair deck") },
  { id:8,  name:"Plant garden bed",    area:"yard",         priority:"low",  done:false, data:dataFor("Plant garden bed") },
  { id:9,  name:"Check smoke detectors",area:"maintenance", priority:"high", done:false, data:dataFor("Check smoke detectors") },
  { id:10, name:"Wash windows",        area:"cleaning",     priority:"low",  done:false, data:dataFor("Wash windows") },
  { id:11, name:"Replace light fixture",area:"interior",    priority:"low",  done:false, data:dataFor("Replace light fixture") },
  { id:12, name:"Trim hedges",         area:"yard",         priority:"med",  done:false, data:dataFor("Trim hedges") },
  { id:13, name:"Organize garage",     area:"cleaning",     priority:"med",  done:false, data:dataFor("Organize garage") },
  { id:14, name:"Weatherstrip doors",  area:"maintenance",  priority:"med",  done:false, data:dataFor("Weatherstrip doors") },
  { id:15, name:"Clean dryer vent",    area:"maintenance",  priority:"high", done:false, data:dataFor("Clean dryer vent") },
];

let nextId = 16;
let activeFilter = "all";
let openPanels = {}; // id -> "tools" | "videos"

function priorityLabel(p) {
  return p === "high" ? "High Priority" : p === "med" ? "Medium" : "Low";
}

const AREA_LABELS = { interior:"Interior", exterior:"Exterior", yard:"Yard & Garden", maintenance:"Maintenance", cleaning:"Cleaning" };
const AREA_ICONS  = { interior:"🛋️", exterior:"🏠", yard:"🌿", maintenance:"🔧", cleaning:"🧹" };

function videoCardsHTML(videos) {
  if (!videos || !videos.length) return `<span style="color:var(--sand);font-size:0.75rem">No videos linked for this task.</span>`;
  return `<div class="video-cards">` + videos.map(v => `
    <a class="video-card" href="${ytUrl(v.q)}" target="_blank" rel="noopener">
      <div class="vid-thumb"><div class="vid-thumb-overlay"></div></div>
      <div class="vid-info">
        <div class="vid-title">${v.title}</div>
        <div class="vid-meta">▶ YouTube · ${v.channel}</div>
      </div>
      <div class="vid-arrow">→</div>
    </a>`).join("") + `</div>`;
}

function render() {
  const list = document.getElementById("task-list");
  const filtered = activeFilter === "all" ? tasks : tasks.filter(t => t.area === activeFilter);

  const done = tasks.filter(t => t.done).length;
  document.getElementById("total-count").textContent = tasks.length;
  document.getElementById("done-count").textContent = done;
  document.getElementById("remaining-count").textContent = tasks.length - done;
  document.getElementById("progress-bar").style.width = (tasks.length ? done / tasks.length * 100 : 0) + "%";

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">🏡</div><p>No tasks here. Add one above!</p></div>`;
    return;
  }

  const areaOrder = ["interior","exterior","yard","maintenance","cleaning"];
  const areas = activeFilter === "all" ? areaOrder : [activeFilter];
  let html = "";

  for (const area of areas) {
    const group = filtered.filter(t => t.area === area);
    if (!group.length) continue;
    html += `<div class="section-label">${AREA_ICONS[area]} ${AREA_LABELS[area]}</div>`;

    for (const task of group) {
      const activeTab = openPanels[task.id];
      const isOpen = !!activeTab;
      html += `
      <div class="task-card ${task.done ? 'done' : ''}">
        <div class="task-main" onclick="toggleDone(${task.id})">
          <div class="check-box"></div>
          <div class="task-info">
            <div class="task-name">${task.data.icon} ${task.name}</div>
            <div class="task-meta">
              <span class="tag tag-area">${AREA_LABELS[task.area]}</span>
              <span class="tag tag-priority-${task.priority}">${priorityLabel(task.priority)}</span>
            </div>
          </div>
          <div class="task-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" title="Tools needed" onclick="openTab(${task.id},'tools')">🔧</button>
            <button class="yt-action-btn" onclick="openTab(${task.id},'videos')">
              <div class="yt-pill"></div>Videos
            </button>
            <button class="icon-btn" title="Remove task" onclick="removeTask(${task.id})">🗑️</button>
          </div>
        </div>

        <div class="detail-panel ${isOpen ? 'open' : ''}">
          <div class="panel-tabs">
            <button class="panel-tab ${activeTab==='tools' ? 'active' : ''}" onclick="openTab(${task.id},'tools')">🔧 Tools Needed</button>
            <button class="panel-tab ${activeTab==='videos' ? 'active' : ''}" onclick="openTab(${task.id},'videos')">▶ How-To Videos</button>
          </div>
          <div class="tab-pane ${activeTab==='tools' ? 'active' : ''}">
            <div class="section-mini-label tools-label">Tools needed for this project</div>
            <div class="tools-list">
              ${task.data.tools.map(t=>`<div class="tool-chip">🔩 ${t}</div>`).join("")}
            </div>
          </div>
          <div class="tab-pane ${activeTab==='videos' ? 'active' : ''}">
            <div class="section-mini-label videos-label">▶ Tutorial videos — click to search on YouTube</div>
            ${videoCardsHTML(task.data.videos)}
          </div>
        </div>
      </div>`;
    }
  }

  list.innerHTML = html;
}

function openTab(id, tab) {
  openPanels[id] = openPanels[id] === tab ? null : tab;
  render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  render();
}

function removeTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  delete openPanels[id];
  render();
}

function addTask() {
  const input = document.getElementById("new-task-input");
  const area = document.getElementById("new-task-area").value;
  const priority = document.getElementById("new-task-priority").value;
  const name = input.value.trim();
  if (!name) return;
  tasks.push({ id: nextId++, name, area, priority, done: false, data: guessData(name) });
  input.value = "";
  render();
}

document.getElementById("new-task-input").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

render();
</script>
